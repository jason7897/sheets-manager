<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 스프레드시트 매니저</title>
    <style>
        :root {
            --primary: #0f9d58;
            --primary-light: #e6f4ea;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #202124;
            --muted: #5f6368;
            --border: #dadce0;
            --danger: #c5221f;
            --danger-light: #fce8e6;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px 40px;
        }

        /* ── 헤더 ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .header-title { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 8px; }

        /* ── 레이아웃 ── */
        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .main { flex: 1; min-width: 0; }

        /* ══════════════════════════════════════
           사이드바 & 트리
        ══════════════════════════════════════ */
        .sidebar {
            width: 232px;
            flex-shrink: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 12px 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .6px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-header-btns { display: flex; gap: 2px; }
        #tree-root { overflow-y: auto; flex: 1; padding: 5px 4px 8px; }

        /* 트리 행 */
        .tree-row {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 5px 5px;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            min-width: 0;
            user-select: none;
        }
        .tree-row:hover { background: #f1f3f4; }
        .tree-node.selected > .tree-row { background: var(--primary-light); }
        .tree-node.selected > .tree-row .tree-name { color: var(--primary); font-weight: 600; }

        /* 트리 액션 버튼 — 평소 숨김, hover 시 표시 */
        .tree-actions { display: none; align-items: center; gap: 1px; flex-shrink: 0; margin-left: auto; }
        .tree-row:hover .tree-actions,
        .tree-node.selected > .tree-row .tree-actions { display: flex; }

        .tree-icon-btn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 2px; border-radius: 3px;
            display: flex; align-items: center;
            transition: background .12s, color .12s;
            flex-shrink: 0;
        }
        .tree-icon-btn:hover { background: rgba(0,0,0,.07); color: var(--text); }
        .tree-icon-btn.danger:hover { background: var(--danger-light); color: var(--danger); }
        .tree-icon-btn.add:hover { background: var(--primary-light); color: var(--primary); }

        .tree-toggle {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 1px; border-radius: 3px;
            display: flex; align-items: center; flex-shrink: 0;
            transition: color .12s;
        }
        .tree-toggle:hover { color: var(--text); }
        .tree-toggle.invis { visibility: hidden; }

        .tree-name {
            font-size: 13px; color: var(--text);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1; min-width: 0;
        }

        /* 인라인 리네임 */
        .tree-rename-wrap {
            display: flex; align-items: center; gap: 3px;
            flex: 1; min-width: 0;
        }
        .tree-rename-input, .tree-add-input {
            flex: 1; min-width: 0;
            border: 1.5px solid var(--primary);
            border-radius: 5px;
            padding: 2px 6px;
            font-size: 13px;
            outline: none;
            box-shadow: 0 0 0 2px rgba(15,157,88,.14);
            font-family: inherit;
        }
        .rename-confirm-btn {
            background: none; border: none; cursor: pointer;
            padding: 2px; border-radius: 3px;
            display: flex; align-items: center; flex-shrink: 0;
        }
        .rename-confirm-btn.ok  { color: var(--primary); }
        .rename-confirm-btn.ok:hover  { background: var(--primary-light); }
        .rename-confirm-btn.no  { color: var(--danger); }
        .rename-confirm-btn.no:hover  { background: var(--danger-light); }

        /* 추가 모드 행 */
        .tree-add-row {
            display: flex; align-items: center; gap: 3px;
            padding: 4px 5px; border-radius: 6px;
        }

        /* ── 버튼 공통 ── */
        .btn {
            padding: 9px 14px; border: 1px solid var(--border); background: white;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
            color: var(--muted); transition: background .15s, color .15s, border-color .15s;
            white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn:hover  { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: #0b8a4d; border-color: #0b8a4d; color: white; }

        /* ── 컨트롤 ── */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-bar {
            flex: 1; min-width: 160px; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-bar:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,157,88,.12); }

        /* ── 카드 ── */
        #sheet-container { display: grid; gap: 18px; }
        #sheet-container.grid-view { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        #sheet-container.list-view { grid-template-columns: 1fr; }

        .sheet-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px;
            display: flex; flex-direction: column; gap: 10px;
            transition: box-shadow .2s, transform .2s;
        }
        .sheet-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.09); transform: translateY(-2px); }
        #sheet-container.list-view .sheet-card { flex-direction: row; align-items: center; gap: 16px; }
        #sheet-container.list-view .card-body  { flex: 1; }
        #sheet-container.list-view .meta-info  { margin-top: 0; padding-top: 0; border-top: none; white-space: nowrap; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .badge.public     { background: #e6f4ea; color: #137333; }
        .badge.restricted { background: #fce8e6; color: #c5221f; }
        .badge.archived   { background: #f1f3f4; color: var(--muted); }

        .fav-btn {
            background: none; border: none; cursor: pointer;
            font-size: 17px; padding: 0 2px; line-height: 1; transition: transform .15s;
        }
        .fav-btn:hover { transform: scale(1.25); }
        .pin-icon { font-size: 15px; }

        /* 카드 제목 + 연필 */
        .card-title-row { display: flex; align-items: center; margin: 10px 0 4px; gap: 4px; }
        .card-title {
            font-size: 16px; font-weight: 700; color: var(--text); text-decoration: none;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
        }
        .card-title:hover { color: var(--primary); text-decoration: underline; }

        /* 카드 연필 — hover 시만 표시 */
        .card-pencil-btn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 2px; border-radius: 4px;
            display: flex; align-items: center;
            opacity: 0; transition: opacity .15s, background .12s;
            flex-shrink: 0;
        }
        .sheet-card:hover .card-pencil-btn { opacity: 1; }
        .card-pencil-btn:hover { background: #f1f3f4; color: var(--text); }

        .card-rename-input {
            flex: 1; border: 1.5px solid var(--primary); border-radius: 6px;
            padding: 3px 8px; font-size: 15px; font-weight: 700;
            outline: none; box-shadow: 0 0 0 2px rgba(15,157,88,.14);
            font-family: inherit;
        }
        .card-rename-actions { display: flex; gap: 2px; }

        .card-desc {
            font-size: 13px; color: var(--muted); margin: 0;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
        .tag { background: #e8f0fe; color: #1a73e8; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .meta-info {
            font-size: 12px; color: var(--muted);
            display: flex; justify-content: space-between;
            margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--border);
        }
        .empty-msg {
            grid-column: 1/-1; text-align: center;
            color: var(--muted); padding: 60px 0; font-size: 15px;
        }

        /* ══════════════════════════════════════
           모달
        ══════════════════════════════════════ */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        .modal-backdrop.open { opacity: 1; pointer-events: all; }
        .modal-box {
            background: white; border-radius: 16px; width: 100%; max-width: 520px;
            padding: 28px 28px 24px; box-shadow: 0 20px 60px rgba(0,0,0,.18);
            transform: translateY(12px) scale(.97); opacity: 0;
            transition: transform .22s cubic-bezier(.34,1.3,.64,1), opacity .22s;
            display: flex; flex-direction: column; gap: 20px;
        }
        .modal-backdrop.open .modal-box { transform: none; opacity: 1; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .modal-close {
            background: none; border: none; cursor: pointer; color: var(--muted);
            padding: 4px; border-radius: 6px; display: flex; align-items: center;
            transition: background .15s, color .15s;
        }
        .modal-close:hover { background: #f1f3f4; color: var(--text); }
        .field-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .url-input {
            width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
            border-radius: 10px; font-size: 14px; outline: none; font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }
        .url-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,157,88,.12); }
        .url-input.valid   { border-color: #0f9d58; }
        .url-input.invalid { border-color: var(--danger); }
        .url-feedback { font-size: 12.5px; margin-top: 7px; font-weight: 500; display: flex; align-items: flex-start; gap: 6px; min-height: 18px; }
        .url-feedback.success { color: #137333; }
        .url-feedback.error   { color: var(--danger); }
        .sheet-id-chip {
            display: inline-block; margin-top: 5px; background: #f1f3f4;
            border-radius: 6px; padding: 3px 8px; font-size: 11.5px;
            font-family: monospace; color: var(--muted); max-width: 100%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .dropzone {
            border: 2px dashed var(--border); border-radius: 12px; padding: 28px 20px;
            text-align: center; transition: background .15s, border-color .15s;
            display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted);
        }
        .dropzone.dragging { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .dropzone-label { font-size: 13.5px; font-weight: 500; }
        .dropzone-sub   { font-size: 12px; color: #9aa0a6; }
        .divider { display: flex; align-items: center; gap: 10px; color: #9aa0a6; font-size: 12px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .drive-btn {
            width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px;
            background: white; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text);
            display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit;
            transition: background .15s, border-color .15s, box-shadow .15s;
        }
        .drive-btn:hover { background: #f8f9fa; border-color: #aaa; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .title-input {
            width: 100%; padding: 10px 13px; border: 1.5px solid var(--border);
            border-radius: 10px; font-size: 14px; outline: none; font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }
        .title-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15,157,88,.12); }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 4px; }
        .btn-cancel {
            padding: 9px 18px; border: 1.5px solid var(--border); background: white;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
            color: var(--muted); transition: background .15s; font-family: inherit;
        }
        .btn-cancel:hover { background: #f1f3f4; }
        .btn-add {
            padding: 9px 20px; background: var(--primary); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700;
            display: flex; align-items: center; gap: 6px; font-family: inherit;
            transition: background .15s, opacity .15s;
        }
        .btn-add:disabled { background: #9aa0a6; cursor: not-allowed; }
        .btn-add:not(:disabled):hover { background: #0b8a4d; }

        /* ── 토스트 ── */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #202124; color: white; padding: 12px 20px;
            border-radius: 10px; font-size: 14px; font-weight: 500;
            box-shadow: 0 6px 24px rgba(0,0,0,.22); opacity: 0; pointer-events: none;
            transition: opacity .2s, transform .2s; white-space: nowrap; z-index: 2000;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
    <div class="header-title">📊 팀 스프레드시트 매니저</div>
    <div class="header-actions">
        <button class="btn btn-primary" id="btn-add-sheet">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            시트 추가
        </button>
        <button class="btn" id="btn-grid" data-view="grid">카드 뷰 🗂️</button>
        <button class="btn" id="btn-list" data-view="list">리스트 뷰 📄</button>
    </div>
</header>

<!-- ── 레이아웃 ── -->
<div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>내 드라이브</span>
            <div class="sidebar-header-btns" id="sidebar-root-add-btns">
                <button class="tree-icon-btn add" data-root-add="folder" title="루트에 새 폴더 추가">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                </button>
            </div>
        </div>
        <div id="tree-root"></div>
    </aside>

    <!-- 메인 -->
    <div class="main">
        <div class="controls">
            <input type="text" class="search-bar" id="searchInput" placeholder="문서 제목, 작성자, 태그 검색...">
            <button class="btn" data-filter="all">전체 보기</button>
            <button class="btn" data-filter="favorite">⭐ 즐겨찾기</button>
            <button class="btn" data-filter="mine">👤 내가 작성한 문서</button>
        </div>
        <div id="sheet-container" class="grid-view"></div>
    </div>
</div>


<!-- ══════════════════════════════════════
     시트 추가 모달
══════════════════════════════════════ -->
<div id="add-modal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0f9d58" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                <span id="modal-title-text">구글 시트 추가하기</span>
            </div>
            <button class="modal-close" id="modal-close-btn" aria-label="닫기">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <div>
            <div class="field-label">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                구글 시트 URL 붙여넣기
            </div>
            <input type="url" class="url-input" id="url-input" placeholder="https://docs.google.com/spreadsheets/d/...">
            <div class="url-feedback" id="url-feedback" aria-live="polite"></div>
        </div>
        <div id="dropzone" class="dropzone" role="region" aria-label="URL 드래그 앤 드롭 영역">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.4"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <div class="dropzone-label">URL 또는 북마크를 여기에 드래그하세요</div>
            <div class="dropzone-sub">브라우저 탭·주소창·북마크를 끌어다 놓을 수 있어요</div>
        </div>
        <div class="divider">또는</div>
        <button class="drive-btn" id="drive-btn">
            <svg width="20" height="18" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L29.4 48H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
                <path d="M43.65 24L27.5 0c-1.35.8-2.5 1.9-3.3 3.3L1.2 43.5C.4 44.9 0 46.45 0 48h29.4z" fill="#00ac47"/>
                <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H57.9l6.2 11.9z" fill="#ea4335"/>
                <path d="M43.65 24L57.8 0H29.5L43.65 24z" fill="#00832d"/>
                <path d="M57.9 48H29.4L13.75 76.8H58.1L57.9 48z" fill="#2684fc"/>
                <path d="M73.4 3.3c-.8-1.4-1.95-2.5-3.3-3.3L57.9 0 43.65 24l14.25 24h29.3c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>
            구글 드라이브에서 직접 선택하기
        </button>
        <div>
            <div class="field-label">시트 제목</div>
            <input type="text" class="title-input" id="title-input" placeholder="예) 2026 Q3 마케팅 예산안" maxlength="60">
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="modal-cancel-btn">취소</button>
            <button class="btn-add" id="modal-add-btn" disabled>
                추가하기
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </div>

};

// ══════════════════════════════════════

// ══════════════════════════════════════
const sheetsData = [
    { id:1, title:'2026 Q3 마케팅 예산안',     desc:'3분기 디지털 마케팅 및 프로모션 예산 집행 내역',  owner:'김민수', updated:'2026-04-10', tags:['마케팅','예산'],    isPinned:true,  isFavorite:true,  access:'public',     status:'active',   link:'#' },
    { id:2, title:'전사 고객 연락처 마스터',    desc:'영업팀 및 CS팀 공유용 VIP 고객 연락처 DB',        owner:'이영희', updated:'2026-04-09', tags:['영업','DB'],        isPinned:true,  isFavorite:false, access:'restricted', status:'active',   link:'#' },

    { id:5, title:'주간 회의록 (4월 2주차)',    desc:'주간 정규 회의 안건 및 Action Item 정리',         owner:'나(PM)', updated:'2026-04-10', tags:['공통','회의록'],    isPinned:false, isFavorite:false, access:'public',     status:'active',   link:'#' },
];
let nextId = 6;

// 트리 초기 데이터
let treeData = [
    { id:'f-mktg',  type:'folder', name:'마케팅', expanded:true,  children:[
        { id:'t-1', type:'sheet', name:'2026 Q3 마케팅 예산안',     sheetId:1 },

    { id:'f-plan',  type:'folder', name:'기획',   expanded:true,  children:[

];

// ── 트리 상태 ──
let treeEditingId = null;   // 현재 rename 중인 노드 ID
let addMode       = null;   // { parentId: string|'root', type: 'folder'|'sheet' }
let selectedId    = 'root'; // 사이드바 선택된 노드 (root = 전체)

// ── 카드 상태 ──
let cardEditingId = null;   // 카드 rename 중인 sheetsData.id
let currentFilter = 'all';
let currentView   = 'grid';

// ══════════════════════════════════════
// 유틸
// ══════════════════════════════════════
function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }
function today() { return new Date().toISOString().slice(0,10); }
function uid(p='n') { return p + Date.now() + Math.random().toString(36).slice(2,5); }

// ══════════════════════════════════════
// 트리 유틸 (순수 함수)
// ══════════════════════════════════════
function findNode(id, nodes=treeData) {
    for (const n of nodes) {
        if (n.id === id) return n;
        if (n.children) { const f=findNode(id,n.children); if(f) return f; }
    }
    return null;
}

function mapTree(nodes, fn) {
    return nodes.map(n => {
        const u = fn({...n});
        if (u.children) u.children = mapTree(u.children, fn);
        return u;
    });
}

function deleteFromTree(id, nodes) {
    return nodes
        .filter(n => n.id !== id)
        .map(n => ({...n, children: n.children ? deleteFromTree(id, n.children) : undefined}));
}

function addToTree(parentId, newNode, nodes) {
    return nodes.map(n => {
        if (n.id === parentId) return {...n, expanded:true, children:[...(n.children||[]), newNode]};
        if (n.children) return {...n, children: addToTree(parentId, newNode, n.children)};
        return n;
    });
}

// 폴더 하위의 모든 sheetId 수집
function collectSheetIds(nodes) {
    const ids = [];
    for (const n of nodes) {
        if (n.type==='sheet') ids.push(n.sheetId);
        if (n.children) ids.push(...collectSheetIds(n.children));
    }
    return ids;
}

// ══════════════════════════════════════
// 트리 렌더링
// ══════════════════════════════════════
function renderTreeNode(node, depth) {
    const isEditing  = treeEditingId === node.id;
    const isSelected = selectedId    === node.id;
    const isExpanded = node.type === 'folder' && node.expanded;
    const indent     = depth * 14 + 6;

    // ── 행 내용 ──
    let rowInner = '';

    // 토글 화살표 (폴더만)
    if (node.type === 'folder') {
        rowInner += `<button class="tree-toggle" data-toggle-id="${node.id}" title="${isExpanded?'접기':'펼치기'}">${isExpanded ? IC.chevDown : IC.chevRight}</button>`;
    } else {
        rowInner += `<span class="tree-toggle invis">${IC.chevRight}</span>`;
    }

    // 아이콘
    rowInner += `<span style="flex-shrink:0;display:flex;align-items:center">${node.type==='folder' ? IC.folder : IC.sheet}</span>`;

    // 이름 또는 편집 입력창
    if (isEditing) {
        rowInner += `
            <span class="tree-rename-wrap">
                <input class="tree-rename-input" id="tree-rename-input" value="${esc(node.name)}" maxlength="60" data-edit-id="${node.id}">
                <button class="rename-confirm-btn ok" id="tree-rename-ok" onmousedown="event.preventDefault()" title="확인">${IC.check}</button>
                <button class="rename-confirm-btn no" id="tree-rename-no" onmousedown="event.preventDefault()" title="취소">${IC.x}</button>
            </span>`;
    } else {
        rowInner += `<span class="tree-name" data-select-id="${node.id}">${esc(node.name)}</span>`;

        // hover 액션 버튼
        let actions = '';
        if (node.type === 'folder') {
            actions += `<button class="tree-icon-btn add" data-add-folder-id="${node.id}" title="새 폴더 추가">${IC.addFolder}</button>`;
            actions += `<button class="tree-icon-btn add" data-add-sheet-id="${node.id}"  title="새 시트 추가">${IC.addSheet}</button>`;
        }
        actions += `<button class="tree-icon-btn" data-rename-id="${node.id}" title="이름 수정">${IC.pencil}</button>`;
        actions += `<button class="tree-icon-btn danger" data-delete-id="${node.id}" title="삭제">${IC.trash}</button>`;
        rowInner += `<span class="tree-actions">${actions}</span>`;
    }

    const selectedClass = isSelected ? ' selected' : '';
    let html = `
        <div class="tree-node${selectedClass}" data-node-id="${node.id}">
            <div class="tree-row" style="padding-left:${indent}px">${rowInner}</div>`;

    // 자식 노드
    if (node.type === 'folder') {
        if (isExpanded && node.children?.length) {
            html += node.children.map(c => renderTreeNode(c, depth+1)).join('');
        }
        // 추가 모드 입력창
        if (addMode && addMode.parentId === node.id) {
            const addIndent = (depth+1)*14+6;
            const typeIcon = addMode.type === 'folder' ? IC.folder : IC.sheet;
            html += `
                <div class="tree-add-row" style="padding-left:${addIndent}px">
                    <span style="display:flex;align-items:center;flex-shrink:0">${typeIcon}</span>
                    <input class="tree-add-input" id="tree-add-input" placeholder="${addMode.type==='folder'?'폴더 이름...':'시트 이름...'}" maxlength="60" autocomplete="off">
                    <button class="rename-confirm-btn ok" id="tree-add-ok"  onmousedown="event.preventDefault()" title="추가">${IC.check}</button>
                    <button class="rename-confirm-btn no" id="tree-add-no"  onmousedown="event.preventDefault()" title="취소">${IC.x}</button>
                </div>`;
        }
    }

    html += `</div>`;
    return html;
}

// 루트 레벨 추가 입력창
function renderRootAddRow() {
    if (!addMode || addMode.parentId !== 'root') return '';
    const typeIcon = addMode.type === 'folder' ? IC.folder : IC.sheet;
    return `
        <div class="tree-add-row" style="padding-left:6px">
            <span style="display:flex;align-items:center;flex-shrink:0">${typeIcon}</span>
            <input class="tree-add-input" id="tree-add-input" placeholder="${addMode.type==='folder'?'폴더 이름...':'시트 이름...'}" maxlength="60" autocomplete="off">
            <button class="rename-confirm-btn ok" id="tree-add-ok"  onmousedown="event.preventDefault()" title="추가">${IC.check}</button>
            <button class="rename-confirm-btn no" id="tree-add-no"  onmousedown="event.preventDefault()" title="취소">${IC.x}</button>
        </div>`;
}

function renderTree() {
    const root = document.getElementById('tree-root');
    root.innerHTML =
        treeData.map(n => renderTreeNode(n, 0)).join('') +
        renderRootAddRow();

    // rename 입력창 포커스
    if (treeEditingId) {
        const inp = document.getElementById('tree-rename-input');
        if (inp) { inp.focus(); inp.select(); setupRenameInputListeners(inp, commitTreeRename, cancelTreeRename); }
    }
    // add 입력창 포커스
    if (addMode) {
        const inp = document.getElementById('tree-add-input');
        if (inp) { inp.focus(); setupRenameInputListeners(inp, commitAdd, cancelAdd); }
    }
}

// Enter/ESC/Blur 핸들링 (confirm/cancel 버튼 mousedown으로 blur 방지 처리됨)
function setupRenameInputListeners(inp, onCommit, onCancel) {
    inp.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); onCommit(); }
        if (e.key === 'Escape') { onCancel(); }
    });
    inp.addEventListener('blur', () => {
        // setTimeout으로 confirm/cancel click 이벤트보다 늦게 실행
        setTimeout(() => { if (treeEditingId || addMode) onCommit(); }, 120);
    });
}

// ══════════════════════════════════════
// 트리 액션
// ══════════════════════════════════════
function startRename(id) {
    treeEditingId = id;
    addMode = null;
    renderTree();
}

function commitTreeRename() {
    const id = treeEditingId;
    if (!id) return;
    const inp = document.getElementById('tree-rename-input');
    const newName = inp?.value.trim();
    treeEditingId = null;

    if (newName) {
        const node = findNode(id);
        treeData = mapTree(treeData, n => n.id===id ? {...n, name:newName} : n);
        // sheet 노드면 sheetsData도 동기화
        if (node?.type==='sheet' && node.sheetId) {
            const s = sheetsData.find(s=>s.id===node.sheetId);
            if (s) s.title = newName;
        }
    }
    renderTree();
    applyFilters();
}

function cancelTreeRename() {
    treeEditingId = null;
    renderTree();
}

function startAdd(parentId, type) {
    addMode = { parentId, type };
    treeEditingId = null;
    // 부모 폴더가 닫혀 있으면 열기
    if (parentId !== 'root') {
        treeData = mapTree(treeData, n => n.id===parentId ? {...n, expanded:true} : n);
    }
    renderTree();
}

function commitAdd() {
    if (!addMode) return;
    const inp = document.getElementById('tree-add-input');
    const name = inp?.value.trim();
    const { parentId, type } = addMode;
    addMode = null;

    if (name) {
        const newId = uid(type==='folder'?'f-':'t-');
        let newNode;
        if (type === 'folder') {
            newNode = { id:newId, type:'folder', name, expanded:false, children:[] };
        } else {
            // 시트 노드 + sheetsData 항목 동시 생성
            const newSheetId = nextId++;
            sheetsData.unshift({
                id:newSheetId, title:name, desc:'', owner:'나(PM)',
                updated:today(), tags:[], isPinned:false, isFavorite:false,
                access:'public', status:'active', link:'#'
            });
            newNode = { id:newId, type:'sheet', name, sheetId:newSheetId };
        }

        if (parentId === 'root') {
            treeData = [...treeData, newNode];
        } else {
            treeData = addToTree(parentId, newNode, treeData);
        }
        showToast(`"${name}" ${type==='folder'?'폴더':'시트'}가 추가되었습니다`);
    }
    renderTree();
    applyFilters();
}

function cancelAdd() {
    addMode = null;
    renderTree();
}

function deleteNode(id) {
    const node = findNode(id);
    if (!node) return;
    // sheet 노드면 sheetsData에서도 제거
    if (node.type==='sheet' && node.sheetId) {
        const idx = sheetsData.findIndex(s=>s.id===node.sheetId);
        if (idx !== -1) sheetsData.splice(idx, 1);
    }
    // 폴더면 하위 시트도 모두 제거
    if (node.type==='folder' && node.children?.length) {
        const ids = collectSheetIds(node.children);
        ids.forEach(sid => {
            const idx = sheetsData.findIndex(s=>s.id===sid);
            if (idx !== -1) sheetsData.splice(idx, 1);
        });
    }
    treeData = deleteFromTree(id, treeData);
    if (selectedId === id) selectedId = 'root';
    showToast(`"${node.name}" 이(가) 삭제되었습니다`, '🗑️');
    renderTree();
    applyFilters();
}

function toggleExpand(id) {
    treeData = mapTree(treeData, n => n.id===id ? {...n, expanded:!n.expanded} : n);
    renderTree();
}

function selectNode(id) {
    selectedId = id;
    treeEditingId = null;
    addMode = null;
    renderTree();
    applyFilters();
}

// ══════════════════════════════════════
// 트리 이벤트 위임
// ══════════════════════════════════════
document.getElementById('tree-root').addEventListener('click', e => {
    const t = e.target;

    // 확인/취소 (rename)
    if (t.closest('#tree-rename-ok'))  { commitTreeRename(); return; }
    if (t.closest('#tree-rename-no'))  { cancelTreeRename(); return; }
    // 확인/취소 (add)
    if (t.closest('#tree-add-ok'))     { commitAdd(); return; }
    if (t.closest('#tree-add-no'))     { cancelAdd(); return; }

    const btn = t.closest('[data-toggle-id],[data-select-id],[data-rename-id],[data-delete-id],[data-add-folder-id],[data-add-sheet-id]');
    if (!btn) return;

    if (btn.dataset.toggleId)     { toggleExpand(btn.dataset.toggleId); return; }
    if (btn.dataset.selectId)     { selectNode(btn.dataset.selectId); return; }
    if (btn.dataset.renameId)     { startRename(btn.dataset.renameId); return; }
    if (btn.dataset.deleteId)     { deleteNode(btn.dataset.deleteId); return; }
    if (btn.dataset.addFolderId)  { startAdd(btn.dataset.addFolderId, 'folder'); return; }
    if (btn.dataset.addSheetId)   { startAdd(btn.dataset.addSheetId, 'sheet'); return; }
});

// 사이드바 헤더 루트 폴더 추가
document.getElementById('sidebar-root-add-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-root-add]');
    if (btn) startAdd('root', btn.dataset.rootAdd);
});

                   <button class="rename-confirm-btn no" id="card-rename-no" onmousedown="event.preventDefault()" title="취소">${IC.x}</button>
                 </div>
               </div>`
            : `<div class="card-title-row">
                 <a href="${esc(sheet.link)}" class="card-title">${esc(sheet.title)}</a>
                 <button class="card-pencil-btn" data-card-rename-id="${sheet.id}" title="이름 수정">${IC.pencil}</button>
               </div>`;

        return `
        <div class="sheet-card" data-id="${sheet.id}">
          <div class="card-body">
            <div class="card-header">
              <div class="badges">
                <span class="badge ${accessClass}">${esc(accessLabel)}</span>
                ${archivedBadge}
              </div>
              <div style="display:flex;align-items:center;gap:4px;">
                ${pinIcon}
                <button class="fav-btn" data-id="${sheet.id}" title="즐겨찾기 토글"
                  aria-label="${sheet.isFavorite?'즐겨찾기 해제':'즐겨찾기 추가'}"
                  aria-pressed="${sheet.isFavorite}">${favIcon}</button>
              </div>
            </div>
            ${titleHtml}
            <p class="card-desc">${esc(sheet.desc)}</p>
            <div class="tags">${tagsHtml}</div>
          </div>
          <div class="meta-info">
            <span>작성자: <strong>${esc(sheet.owner)}</strong></span>
            <span>업데이트: ${esc(sheet.updated)}</span>
          </div>
        </div>`;
    }).join('');

    // 카드 rename 입력창 포커스 & 이벤트 설정
    if (cardEditingId) {
        const inp = document.getElementById('card-rename-input');
        if (inp) {
            inp.focus(); inp.select();
            inp.addEventListener('keydown', e => {
                if (e.key==='Enter') { e.preventDefault(); commitCardRename(); }
                if (e.key==='Escape') cancelCardRename();
            });
            inp.addEventListener('blur', () => {
                setTimeout(() => { if (cardEditingId) commitCardRename(); }, 120);
            });
            document.getElementById('card-rename-ok')?.addEventListener('click', commitCardRename);
            document.getElementById('card-rename-no')?.addEventListener('click', cancelCardRename);
        }
    }
}

// ── 카드 rename 액션 ──
function startCardRename(sheetId) {
    cardEditingId = sheetId;
    applyFilters(); // re-render with input
}

function commitCardRename() {
    const id = cardEditingId;
    if (!id) return;
    const inp = document.getElementById('card-rename-input');
    const newName = inp?.value.trim();
    cardEditingId = null;

    if (newName) {
        const sheet = sheetsData.find(s=>s.id===id);
        if (sheet) {
            sheet.title = newName;
            // 연결된 트리 노드도 동기화
            treeData = mapTree(treeData, n =>
                (n.type==='sheet' && n.sheetId===id) ? {...n, name:newName} : n
            );
            renderTree();
        }
    }
    applyFilters();
}

function cancelCardRename() {
    cardEditingId = null;
    applyFilters();
}

// ══════════════════════════════════════
// 필터링
// ══════════════════════════════════════
function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();

    // 사이드바 선택 기반 시트 ID 집합
    let allowedIds = null; // null = 전체 허용
    if (selectedId !== 'root') {
        const node = findNode(selectedId);
        if (node) {
            if (node.type === 'folder') {
                allowedIds = new Set(collectSheetIds([node]));
            } else if (node.type === 'sheet') {
                allowedIds = new Set([node.sheetId]);
            }
        }
    }

    const filtered = sheetsData.filter(sheet => {
        if (allowedIds && !allowedIds.has(sheet.id)) return false;

        const textMatch = !query
            || sheet.title.toLowerCase().includes(query)
            || sheet.desc.toLowerCase().includes(query)
            || sheet.owner.toLowerCase().includes(query)
            || sheet.tags.some(t=>t.toLowerCase().includes(query));

        const quickMatch =
            currentFilter==='all'      ? true :
            currentFilter==='favorite' ? sheet.isFavorite :
            sheet.owner === '나(PM)';

        return textMatch && quickMatch;
    });

    renderSheets(filtered);
}

// ══════════════════════════════════════
// 카드 이벤트 위임
// ══════════════════════════════════════
document.getElementById('sheet-container').addEventListener('click', e => {
    // 즐겨찾기
    const favBtn = e.target.closest('.fav-btn');
    if (favBtn && favBtn.dataset.id) {
        const id = Number(favBtn.dataset.id);
        const s  = sheetsData.find(s=>s.id===id);
        if (s) { s.isFavorite = !s.isFavorite; applyFilters(); }
        return;
    }
    // 카드 rename 시작
    const pencilBtn = e.target.closest('[data-card-rename-id]');
    if (pencilBtn) {
        startCardRename(Number(pencilBtn.dataset.cardRenameId));
        return;
    }
});

// ══════════════════════════════════════
// 뷰 전환
// ══════════════════════════════════════
function setView(type) {
    currentView = type;
    document.getElementById('sheet-container').className = type + '-view';
    document.querySelectorAll('[data-view]').forEach(b =>
        b.classList.toggle('active', b.dataset.view===type)
    );
}

document.querySelector('header').addEventListener('click', e => {
    const btn = e.target.closest('[data-view]');
    if (btn) setView(btn.dataset.view);
});

// 퀵 필터
document.querySelector('.controls').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(b =>
        b.classList.toggle('active', b.dataset.filter===currentFilter)
    );
    applyFilters();
});

// 검색
document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));

// ══════════════════════════════════════
// 토스트
// ══════════════════════════════════════
let toastTimer;
function showToast(msg, icon='✅') {
    const el = document.getElementById('toast');
    el.innerHTML = icon + ' ' + esc(msg);
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

// ══════════════════════════════════════
// 시트 추가 모달
// ══════════════════════════════════════
const SHEETS_ID_RE = /\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/;
let parsedSheetId  = null;
let parsedSheetUrl = '';

function openModal() {
    resetModal();
    document.getElementById('add-modal').classList.add('open');
    document.getElementById('url-input').focus();
    document.body.style.overflow = 'hidden';
}
function closeModal() {
    document.getElementById('add-modal').classList.remove('open');
    document.body.style.overflow = '';
}
function resetModal() {
    parsedSheetId=null; parsedSheetUrl='';
    document.getElementById('url-input').value='';
    document.getElementById('title-input').value='';
    setUrlFeedback(null);
    document.getElementById('modal-add-btn').disabled=true;
}
function setUrlFeedback(state, id) {
    const input=document.getElementById('url-input');
    const feedback=document.getElementById('url-feedback');
    const addBtn=document.getElementById('modal-add-btn');
    input.classList.remove('valid','invalid');
    if (state==='success') {
        input.classList.add('valid');
        feedback.className='url-feedback success';
        feedback.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 15.01 9 12.01"/></svg><span>✅ 올바른 구글 시트입니다<br><span class="sheet-id-chip">시트 ID: ${esc(id)}</span></span>`;
        addBtn.disabled=false;
    } else if (state==='error') {
        input.classList.add('invalid');
        feedback.className='url-feedback error';
        feedback.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>구글 시트 URL 형식이 맞지 않습니다`;
        addBtn.disabled=true;
    } else {
        feedback.className='url-feedback'; feedback.innerHTML=''; addBtn.disabled=true;
    }
}
const handleUrlInput = debounce(()=>{
    const raw=document.getElementById('url-input').value.trim();
    if (!raw) { setUrlFeedback(null); parsedSheetId=null; return; }
    const m=raw.match(SHEETS_ID_RE);
    if (m) {
        parsedSheetId=m[1]; parsedSheetUrl=raw;
        setUrlFeedback('success',m[1]);
        const t=document.getElementById('title-input');
        if (!t.value) t.value='새 스프레드시트';
    } else {
        parsedSheetId=null; setUrlFeedback('error');
    }
},400);

const dropzone=document.getElementById('dropzone');
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('dragging');});
dropzone.addEventListener('dragleave',e=>{ if(!dropzone.contains(e.relatedTarget)) dropzone.classList.remove('dragging'); });
dropzone.addEventListener('drop',e=>{
    e.preventDefault(); dropzone.classList.remove('dragging');
    const uri=e.dataTransfer.getData('text/uri-list');
    const url=(uri ? uri.split('\n').find(l=>l.trim()&&!l.startsWith('#')) : e.dataTransfer.getData('text/plain').trim())||'';
    if (!url) return;
    document.getElementById('url-input').value=url; handleUrlInput();
});
document.getElementById('drive-btn').addEventListener('click',()=>{
    showToast('구글 파일 피커가 열립니다 (실제 연동 시 OAuth 필요)','🔵');
});
document.getElementById('url-input').addEventListener('input', handleUrlInput);
document.getElementById('modal-add-btn').addEventListener('click',()=>{
    const title=document.getElementById('title-input').value.trim()||'새 스프레드시트';
    if (!parsedSheetId) return;
    const newSheetId=nextId++;
    sheetsData.unshift({id:newSheetId,title,desc:`시트 ID: ${parsedSheetId}`,owner:'나(PM)',updated:today(),tags:[],isPinned:false,isFavorite:false,access:'public',status:'active',link:parsedSheetUrl});
    closeModal(); applyFilters(); showToast(`"${title}" 시트가 추가되었습니다`);
});
document.getElementById('modal-close-btn').addEventListener('click',closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click',closeModal);
document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('add-modal')) closeModal(); });
document.getElementById('btn-add-sheet').addEventListener('click',openModal);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ══════════════════════════════════════
// 초기화
// ══════════════════════════════════════
setView('grid');
document.querySelector('[data-filter="all"]').classList.add('active');
renderTree();
applyFilters();
</script>
